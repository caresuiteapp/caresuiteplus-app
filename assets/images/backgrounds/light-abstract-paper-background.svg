      <stop offset="42%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F7F7F7"/>
    </linearGradient>
    <radialGradient id="centerCalm" cx="50%" cy="46%" r="58%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
