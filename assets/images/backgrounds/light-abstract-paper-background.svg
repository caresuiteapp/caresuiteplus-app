      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#E8E8E8" flood-opacity="0.55"/>
    </filter>
    <filter id="softShadowLg" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
