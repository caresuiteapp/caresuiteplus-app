# CareSuite+ – lokale Supabase-Konfiguration
# Start: npx supabase start
# Migrationen: npx supabase db push

project_id = "caresuite-plus"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081"]

[auth.email]
enable_signup = true
enable_confirmations = false