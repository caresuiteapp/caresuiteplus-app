# Deploy-Steuerung (siehe .cursor/rules/no-auto-deploy.mdc):
# - Git-Push OHNE [deploy] in der Commit-Message → Build wird übersprungen (Canceled).
# - Git-Push MIT [deploy] → Production-Build läuft (nur auf explizite Nutzer-Anfrage).
# - Dashboard „Trigger deploy“ läuft ebenfalls durch ignore — bei exit 0 immer Canceled!
#   Für manuelles Deploy ohne Commit: Build Hook (umgeht ignore) oder `netlify deploy --prod --build`.
# ignore exit 0 = jeder Build abgebrochen (auch Dashboard). exit 1 = Build ausführen.
# Last production deploy request: 2026-06-28
[build]
  command = "npm ci && npx expo export --platform web"
  publish = "dist"
  ignore = "bash -c 'if git log -1 --pretty=%B | grep -q \"\\[deploy\\]\"; then exit 1; else exit 0; fi'"
  # ignore = "exit 0"  # blockiert auch Dashboard-Trigger — nur für „nie bauen“

[build.environment]
  EXPO_PUBLIC_DEMO_MODE = "false"
  EXPO_PUBLIC_SUPABASE_URL = "https://euagyyztvmemuaiumvxm.supabase.co"
