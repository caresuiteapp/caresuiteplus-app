# Deploy nur bei Bedarf:
# Letzter Deploy-Trigger: 2026-06-22
# - Commit-Message mit [deploy] pushen, ODER
# - Im Netlify-Dashboard „Trigger deploy“ ausführen
# Ohne [deploy] wird der Build übersprungen (ignore exit 0 = skip, exit 1 = build).
[build]
  command = "npm ci && npx expo export --platform web"
  publish = "dist"
  ignore = "bash -c 'if git log -1 --pretty=%B | grep -q \"\\[deploy\\]\"; then exit 1; else exit 0; fi'"

